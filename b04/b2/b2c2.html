<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.2.1.min.js"></script>
    <script
      src="http://ajax.aspnetcdn.com/ajax/jquery.validate/1.9/jquery.validate.min.js"
      type="text/javascript"
    ></script>
    <link rel="stylesheet" href="b2c2.css" />
    <link rel="stylesheet" href="../flex.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="container">
        <form action="" id="form">
          <div class="d-flex col-dir gap-30 justify-center item-center pt-30">
            <div class="form-group" id="name-product">
              <label for="name">Tên sản phẩm</label>
              <select name="name" id="dropdown">
                <option selected value="">-- Chọn sản phẩm --</option>
                <option value="pants">pants</option>
                <option value="clothes">clothes</option>
                <option value="hat">hat</option>
                <option value="shoes">shoes</option>
                <option value="belt">belt</option>
              </select>
            </div>
            <div class="form-group">
              <label for="quantity">số lượng</label>
              <input name="quantity" id="quantity" type="number" />
            </div>
            <div class="form-group">
              <label for="date">ngày giao hàng</label>
              <input name="date" id="date" type="date" />
            </div>
            <div class="form-group">
              <label for="address">Địa chỉ giao hàng</label>
              <input name="address" id="address" type="text" />
            </div>
            <div class="form-group note">
              <label for="note">Ghi chú</label>
              <input name="note" id="note" type="text" />
              <span id="count"></span>
            </div>

            <div class="radio-group d-flex">
              <label>Phương thức thanh toán:</label>
              <div class="radio-options">
                <input name="radio" value="cod" type="radio" id="cod" />
                <label for="cod">COD</label>
                <input name="radio" value="ck" type="radio" id="ck" />
                <label for="ck">Chuyển khoản</label>
                <input name="radio" value="dtu" type="radio" id="dtu" />
                <label for="dtu">Ví điện tử</label>
              </div>
            </div>
            <button>Submit</button>
          </div>
        </form>
        <div class="text-center pt-30" id="totalPrice"></div>
        <div id="infor"></div>
      </div>
    </div>
    <script src="b2.2l2.js"></script>
  </body>
</html>
