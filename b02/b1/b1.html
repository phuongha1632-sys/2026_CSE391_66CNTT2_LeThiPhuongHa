<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bai1</title>
    <link rel="stylesheet" href="./style1.css" />
    <link rel="stylesheet" href="../flex.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="container bd pd-20">
        <h3>Get in touch with us by filling contact form below</h3>
        <div class="rows gap20">
          <div class="w-2">
            <input
              type="text"
              class="mb-10 input-height w-1"
              placeholder="* Enter your full name"
            />
          </div>
          <div class="w-2">
            <input
              type="text"
              class="mb-10 input-height w-1"
              placeholder="* Enter your email addreess"
            />
          </div>
        </div>
        <input
          type="text"
          class="d-block mb-10 w-1 input-height"
          placeholder="* Enter your subject"
        />
        <input
          type="text"
          class="d-block w-1 input-height mb-10 input3-height"
          placeholder="* Your message here..."
        />
        <div class="d-flex space-between">
          <button class="btn-bg btn white-color">Send message</button>
          <span class="grey-color"
            >* Please fill all required form field, thanks!</span
          >
        </div>
      </div>
    </div>
  </body>
</html>
